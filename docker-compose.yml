# Wardex container — docker-compose reference
# Start: docker compose up -d
# Logs:  docker compose logs -f wardex
# Stop:  docker compose down

services:
  wardex:
    build: .
    image: wardex:latest
    container_name: wardex
    ports:
      - "8080:8080"
    volumes:
      - wardex-data:/app/var
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    environment:
      - SENTINEL_CORS_ORIGIN=http://localhost:8080
    healthcheck:
      test: ["CMD", "/app/wardex", "status-json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wardex-data:
