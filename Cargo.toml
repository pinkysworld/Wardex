[package]
name = "sentineledge"
version = "0.1.0"
edition = "2024"
description = "Edge security runtime scaffold for anomaly detection, adaptive response, and verifiable audit trails"
license = "TBD"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
sha2 = "0.10"
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
tiny_http = "0.12"
rand = "0.8"
