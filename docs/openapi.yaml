                type: array
                items: { $ref: "#/components/schemas/PlaybookExecution" }

  # ── v0.43.0 Alert Deduplication ────────────────────────────────────
  /api/alerts/dedup:
    get:
      tags: [Alerts]
      summary: Deduplicate alerts into incidents using time-window merging
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Deduplicated incident groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DedupIncident" }

  /api/alerts/dedup/auto-create:
    post:
      tags: [Alerts]
      summary: Auto-create incidents from deduplicated alert groups
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Incident auto-creation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupAutoCreateResponse"
              example:
                status: ok
                created_incidents: ["INC-0001", "INC-0004"]
                count: 2

  # ── v0.43.0 API Analytics ─────────────────────────────────────────
  /api/analytics:
    get:
      tags: [Observability]
      summary: Get API usage analytics (per-endpoint counts, error rates, latency)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Analytics summary with top endpoints and total request count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
              example:
                total_requests: 120
                total_errors: 4
                error_rate: 0.0333
                unique_endpoints: 18
                top_endpoints:
                  - path: "/api/alerts"
                    method: "GET"
                    request_count: 42
                    error_count: 1
                    avg_latency_ms: 18.4
                    p95_latency_ms: 29.0

  # ── v0.43.0 OpenTelemetry Traces ──────────────────────────────────
  /api/traces:
    get:
      tags: [Observability]
      summary: Get recent OpenTelemetry-compatible trace spans
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Trace stats and recent spans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TracesResponse"
              example:
                stats:
                  total_spans: 24
                  error_spans: 2
                  avg_duration_ms: 18.75
                recent:
                  - trace_id: "00000000000000000000000000000001"
                    span_id: "0000000000000001"
                    parent_span_id: null
                    operation_name: "GET /api/alerts"
                    service_name: "wardex"
                    start_time_ms: 1714507800000
                    end_time_ms: 1714507800019
                    status: "Ok"
                    attributes:
                      - ["http.method", "GET"]
                      - ["http.route", "/api/alerts"]

  # ── v0.43.0 Backup Management ─────────────────────────────────────
  /api/backups:
    get:
      tags: [Backup]
      summary: List available database backups
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Backup files sorted newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BackupRecord" }
              example:
                - name: wardex_backup_20260430_223500.db
                  timestamp: 2026-04-30T22:35:00Z
                  size_bytes: 4096
                  checksum: 0123456789abcdef
                  verified: true
    post:
      tags: [Backup]
      summary: Create a new database backup
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Created backup metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupRecord" }
              example:
                name: wardex_backup_20260430_223500.db
                timestamp: 2026-04-30T22:35:00Z
                size_bytes: 4096
                checksum: 0123456789abcdef
                verified: true

  /api/admin/backup:
    post:
      tags: [Admin]
      summary: Create a SQLite database backup file
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Backup file created successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBackupResponse" }
              example:
                status: completed
                path: var/backups/wardex_backup_20260430_223500.db
                timestamp: 2026-04-30T22:35:00Z

  /api/backup/status:
    get:
      tags: [Backup]
      summary: Get backup configuration status
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Backup configuration status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupStatus" }
              example:
                enabled: false
                retention_count: 7
                path: var/backups/
                schedule_cron: 0 2 * * *

  # ── v0.43.0 Backup Encryption ─────────────────────────────────────

  /api/backup/encrypt:
    post:
      tags: [Backup]
      summary: Encrypt data with AES-256-GCM
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupEncryptRequest" }
      responses:
        "200":
          description: Base64-encoded encrypted data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupEncryptResponse" }
        "400":
          description: Missing passphrase

  /api/backup/decrypt:
    post:
      tags: [Backup]
      summary: Decrypt AES-256-GCM encrypted data
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupDecryptRequest" }
      responses:
        "200":
          description: Decrypted plaintext
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupDecryptResponse" }
        "400":
          description: Missing passphrase or decryption error

  # ── v0.43.0 Detection Rules CRUD ──────────────────────────────────
  /api/detection/rules:
    get:
      tags: [Detection]
      summary: List loaded detection rules (Sigma, YARA, malware hashes)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Rule inventory with counts per engine
    post:
      tags: [Detection]
      summary: Add a custom detection rule
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, pattern]
              properties:
                type: { type: string, enum: [yara] }
                name: { type: string, default: custom_rule }
                pattern: { type: string, minLength: 1 }
                description: { type: string }
                severity: { type: string, enum: [low, medium, high, critical], default: medium }
      responses:
        "200":
          description: Rule added successfully
        "400":
          description: Empty pattern or unsupported rule type
