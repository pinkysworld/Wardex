      responses:
        "200":
          description: Precision, recall, false-positive rate, category outcomes, platform deltas, signal-type deltas, and acceptance targets
    post:
      tags: [Detection]
      summary: Evaluate a custom or retained-event replay-corpus validation pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                source:
                  type: string
                  enum: [custom, retained_events]
                  description: Defaults to custom. retained_events samples the most recent stored events.
                limit:
                  type: integer
                  minimum: 1
                  maximum: 256
                  description: Maximum retained events to sample when source is retained_events.
                threshold: { type: number }
                samples:
                  type: array
                  description: Required when source is custom.
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      label: { type: string }
                      expected: { type: string, enum: [benign, malicious] }
                      platform:
                        type: string
                        description: Optional custom platform label used for replay delta breakdowns. Defaults to server-side fallback grouping when omitted.
                      signal_type:
                        type: string
                        description: Optional custom signal-family label used for replay delta breakdowns. Defaults to server-side inference when omitted.
                      sample: { $ref: "#/components/schemas/TelemetrySample" }
      responses:
        "200":
          description: Precision, recall, false-positive rate, category outcomes, platform deltas, signal-type deltas, and acceptance targets

