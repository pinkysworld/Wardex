components:
  schemas:
    Agent:
      type: object
      properties:
        hostname:
          type: string
        id:
          type: string
        platform:
          type: string
        status:
          type: string
          enum:
          - online
          - offline
          - stale
        version:
          type: string
    Alert:
      type: object
      properties:
        id:
          type: integer
          format: int64
        level:
          type: string
          enum:
          - Nominal
          - Elevated
          - Severe
          - Critical
        score:
          type: number
          format: float
        timestamp:
          type: string
          format: date-time
      required:
      - id
      - level
      - timestamp
      - score
    CommandCenterLanePayload:
      type: object
      properties:
        active_suppressions:
          type: integer
          format: int64
        annotation:
          type: string
        candidates:
          type: integer
          format: int64
        count:
          type: integer
          format: int64
        current_version:
          type: string
        href:
          type: string
        issues:
          type: integer
          format: int64
        next_step:
          type: string
        noisy:
          type: integer
          format: int64
        pending:
          type: integer
          format: int64
        planned:
          type: array
          items:
            type: string
        readiness:
          type: object
        rollback_ready:
          type: integer
          format: int64
        score:
          type: number
          format: double
        stale:
          type: integer
          format: int64
        status:
          type: string
        templates:
          type: integer
          format: int64
      required:
      - status
      - annotation
      - next_step
    CommandCenterLaneResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        lane:
          type: string
          enum:
          - incidents
          - remediation
          - connectors
          - rule_tuning
          - release
          - evidence
        metric_key:
          type: string
          enum:
          - open_incidents
          - pending_remediation_reviews
          - connector_issues
          - noisy_rules
          - release_candidates
          - compliance_packs
        metric_value:
          type: integer
          format: int64
        payload:
          $ref: '#/components/schemas/CommandCenterLanePayload'
      required:
      - lane
      - generated_at
      - metric_key
      - metric_value
      - payload
    CommandCenterLanes:
      type: object
      properties:
        connectors:
          $ref: '#/components/schemas/CommandCenterLanePayload'
        evidence:
          $ref: '#/components/schemas/CommandCenterLanePayload'
        incidents:
          $ref: '#/components/schemas/CommandCenterLanePayload'
        release:
          $ref: '#/components/schemas/CommandCenterLanePayload'
        remediation:
          $ref: '#/components/schemas/CommandCenterLanePayload'
        rule_tuning:
          $ref: '#/components/schemas/CommandCenterLanePayload'
      required:
      - incidents
      - remediation
      - connectors
      - rule_tuning
      - release
      - evidence
    CommandCenterMetrics:
      type: object
      properties:
        active_cases:
          type: integer
          format: int64
        compliance_packs:
          type: integer
          format: int64
        connector_issues:
          type: integer
          format: int64
        noisy_rules:
          type: integer
          format: int64
        offline_agents:
          type: integer
          format: int64
        open_incidents:
          type: integer
          format: int64
        pending_remediation_reviews:
          type: integer
          format: int64
        release_candidates:
          type: integer
          format: int64
        rollback_ready_reviews:
          type: integer
          format: int64
        stale_rules:
          type: integer
          format: int64
      required:
      - open_incidents
      - active_cases
      - pending_remediation_reviews
      - rollback_ready_reviews
      - connector_issues
      - noisy_rules
      - stale_rules
      - release_candidates
      - compliance_packs
      - offline_agents
    CommandCenterSummaryResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        lanes:
          $ref: '#/components/schemas/CommandCenterLanes'
        metrics:
          $ref: '#/components/schemas/CommandCenterMetrics'
      required:
      - generated_at
      - metrics
      - lanes
    Error:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
        error:
          type: string
      required:
      - error
      - code
    Incident:
      type: object
      properties:
        id:
          type: integer
          format: int64
        severity:
          type: string
        status:
          type: string
          enum:
          - Open
          - Investigating
          - Contained
          - Resolved
          - FalsePositive
        title:
          type: string
      required:
      - id
      - title
      - severity
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Admin or RBAC user API token
security:
- bearerAuth: []
tags:
- name: auth
  description: Authentication, session, and token management
- name: status
  description: Platform health, status, and diagnostics
- name: command
  description: Command Center lane health and operator action surfaces
- name: detection
  description: Detection engineering, rules, and analysis
- name: alerts
  description: Alert queue, triage, and analysis
- name: incidents
  description: Incident and case management
- name: fleet
  description: Fleet enrollment, agents, and inventory
- name: response
  description: Response orchestration and approvals
- name: policy
  description: Policy publishing and version history
- name: threat-intel
  description: Threat intelligence, enrichment, and investigation pivots
- name: telemetry
  description: Telemetry collection and event forwarding
- name: config
  description: Configuration management
- name: reports
  description: Reports, exports, and executive summaries
- name: updates
  description: Agent updates, releases, and rollouts
- name: hunts
  description: Saved hunts, rule lifecycle, and content packs
- name: observability
  description: Metrics, audit, and SLO monitoring
