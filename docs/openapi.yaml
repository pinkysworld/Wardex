        risk_score: { type: number }
        remediation: { type: string }
      required: [advisory, installed_version, package_source, risk_score, remediation]

    VulnerabilityReport:
      type: object
      properties:
        host_id: { type: string }
        scan_timestamp: { type: string }
        total_packages: { type: integer, minimum: 0 }
        vulnerable_packages: { type: integer, minimum: 0 }
        total_cves: { type: integer, minimum: 0 }
        critical_count: { type: integer, minimum: 0 }
        high_count: { type: integer, minimum: 0 }
        medium_count: { type: integer, minimum: 0 }
        low_count: { type: integer, minimum: 0 }
        exploit_available_count: { type: integer, minimum: 0 }
        risk_score: { type: number }
        matches:
          type: array
          items: { $ref: "#/components/schemas/VulnerabilityMatch" }
        top_actions:
          type: array
          items: { type: string }
      required: [host_id, scan_timestamp, total_packages, vulnerable_packages, total_cves, critical_count, high_count, medium_count, low_count, exploit_available_count, risk_score, matches, top_actions]

    VulnerabilitySummary:
      type: object
      properties:
        total_hosts: { type: integer, minimum: 0 }
        vulnerable_hosts: { type: integer, minimum: 0 }
        total_cves: { type: integer, minimum: 0 }
        critical_cves: { type: integer, minimum: 0 }
        high_cves: { type: integer, minimum: 0 }
        exploit_available: { type: integer, minimum: 0 }
        average_risk_score: { type: number }
        advisory_database_size: { type: integer, minimum: 0 }
      required: [total_hosts, vulnerable_hosts, total_cves, critical_cves, high_cves, exploit_available, average_risk_score, advisory_database_size]

    EmailAuthStatus:
      type: string
      enum: [pass, fail, softfail, none, unknown]

    EmailAuthResults:
      type: object
      properties:
        spf: { $ref: "#/components/schemas/EmailAuthStatus" }
        dkim: { $ref: "#/components/schemas/EmailAuthStatus" }
        dmarc: { $ref: "#/components/schemas/EmailAuthStatus" }
        auth_score: { type: number }
      required: [spf, dkim, dmarc, auth_score]

    EmailUrlFinding:
      type: object
      properties:
        url: { type: string }
        risk_score: { type: number }
        indicators:
          type: array
          items: { type: string }
      required: [url, risk_score, indicators]

    EmailAttachmentInfo:
      type: object
      properties:
        filename: { type: string }
        content_type: { type: string, nullable: true }
        sha256: { type: string, nullable: true }
        size_bytes: { type: integer, minimum: 0, nullable: true }
      required: [filename, content_type, sha256, size_bytes]

    EmailAttachmentFinding:
      type: object
      properties:
        filename: { type: string }
        content_type: { type: string, nullable: true }
        sha256: { type: string, nullable: true }
        risk_score: { type: number }
        indicators:
          type: array
          items: { type: string }
      required: [filename, content_type, sha256, risk_score, indicators]

    EmailAnalyzeRequest:
      type: object
      properties:
        from: { type: string }
        reply_to: { type: string, nullable: true }
        return_path: { type: string, nullable: true }
        to: { type: string, nullable: true }
        subject: { type: string, nullable: true }
        received_chain:
          type: array
          items: { type: string }
        authentication_results: { type: string, nullable: true }
        body_text: { type: string, nullable: true }
        body_html: { type: string, nullable: true }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/EmailAttachmentInfo" }
        message_id: { type: string, nullable: true }
      required: [from, received_chain, attachments]

    EmailThreatReport:
      type: object
      properties:
        message_id: { type: string }
        auth_results: { $ref: "#/components/schemas/EmailAuthResults" }
        sender_mismatch: { type: boolean }
        url_findings:
          type: array
          items: { $ref: "#/components/schemas/EmailUrlFinding" }
        attachment_findings:
          type: array
          items: { $ref: "#/components/schemas/EmailAttachmentFinding" }
        urgency_score: { type: number }
        phishing_score: { type: number }
        indicators:
          type: array
          items: { type: string }
      required: [message_id, auth_results, sender_mismatch, url_findings, attachment_findings, urgency_score, phishing_score, indicators]

    PolicyRecord:
      type: object
      properties:
        version: { type: integer, minimum: 0 }
        published_at: { type: string }
        alert_threshold: { type: number, nullable: true }
        interval_secs: { type: integer, minimum: 0, nullable: true }
        watch_paths:
          type: array
          items: { type: string }
          nullable: true
        dry_run: { type: boolean, nullable: true }
        syslog: { type: boolean, nullable: true }
        cef: { type: boolean, nullable: true }
        message: { type: string, nullable: true }
      required: [version]

    PublishPolicyRequest:
      type: object
      properties:
        version: { type: integer, minimum: 0 }
        published_at: { type: string }
        alert_threshold: { type: number, nullable: true }
        interval_secs: { type: integer, minimum: 0, nullable: true }
        watch_paths:
          type: array
          items: { type: string }
          nullable: true
        dry_run: { type: boolean, nullable: true }
        syslog: { type: boolean, nullable: true }
        cef: { type: boolean, nullable: true }
      required: [version, published_at]

    WitnessBundle:
      type: object
      properties:
        backend: { type: string }
        label: { type: string }
        pre_digest: { type: string }
        post_digest: { type: string }
        timestamp: { type: string }
        witness_hex: { type: string }
        proof_hex: { type: string, nullable: true }
        verified: { type: boolean }
      required: [backend, label, pre_digest, post_digest, timestamp, witness_hex, verified]

    DlqStatsResponse:
      type: object
      properties:
        count: { type: integer, minimum: 0 }
        empty: { type: boolean }
      required: [count, empty]

    DlqClearResponse:
      type: object
      properties:
        cleared: { type: integer, minimum: 0 }
      required: [cleared]

    DeadLetterEvent:
      type: object
      properties:
        original_payload: { type: string }
        errors:
          type: array
          items: { type: string }
        received_at: { type: string }
        source_agent: { type: string, nullable: true }
      required: [original_payload, errors, received_at]

    DlqListResponse:
      type: object
      properties:
        dead_letters:
          type: array
          items: { $ref: "#/components/schemas/DeadLetterEvent" }
        count: { type: integer, minimum: 0 }
      required: [dead_letters, count]

    SigmaStatsResponse:
      type: object
      properties:
        total_rules: { type: integer, minimum: 0 }
        engine_status: { type: string }
      required: [total_rules, engine_status]

    QueueStatsResponse:
      type: object
      properties:
        total: { type: integer, minimum: 0 }
        pending: { type: integer, minimum: 0 }
        unacknowledged: { type: integer, minimum: 0 }
        acknowledged: { type: integer, minimum: 0 }
        assigned: { type: integer, minimum: 0 }
        sla_breached: { type: integer, minimum: 0 }
      required: [total, pending, unacknowledged, acknowledged, assigned, sla_breached]

    ResponseStatsResponse:
      type: object
      properties:
        auto_executed: { type: integer, minimum: 0 }
        executed: { type: integer, minimum: 0 }
        pending: { type: integer, minimum: 0 }
        pending_approval: { type: integer, minimum: 0 }
        ready_to_execute: { type: integer, minimum: 0 }
        approved_ready: { type: integer, minimum: 0 }
        total_requests: { type: integer, minimum: 0 }
        denied: { type: integer, minimum: 0 }
        protected_assets: { type: integer, minimum: 0 }
      required: [auto_executed, executed, pending, pending_approval, ready_to_execute, approved_ready, total_requests, denied, protected_assets]

    ResponseActionTier:
      type: string
      enum: [Auto, SingleApproval, DualApproval, BreakGlass]

    ResponseRequestStatus:
      type: string
      enum: [Pending, Approved, Denied, Expired, Executed, DryRunCompleted]

    ResponseApprovalDecision:
      type: string
      enum: [Approve, Deny]

    ResponseTarget:
      type: object
      properties:
        hostname: { type: string }
        agent_uid:
          type: string
          nullable: true
        asset_tags:
          type: array
          items: { type: string }
      required: [hostname, agent_uid, asset_tags]

    ResponseApprovalRecord:
      type: object
      properties:
        approver: { type: string }
        decision: { $ref: "#/components/schemas/ResponseApprovalDecision" }
        timestamp: { type: string }
        comment:
          type: string
          nullable: true
      required: [approver, decision, timestamp, comment]

    ResponseBlastRadius:
      type: object
      properties:
        affected_services: { type: integer, minimum: 0 }
        affected_endpoints: { type: integer, minimum: 0 }
        risk_level: { type: string }
        impact_summary: { type: string }
      required: [affected_services, affected_endpoints, risk_level, impact_summary]

    ResponseRequestInputContext:
      type: object
      properties:
        target: { $ref: "#/components/schemas/ResponseTarget" }
        severity: { type: string }
        tier: { $ref: "#/components/schemas/ResponseActionTier" }
        dry_run: { type: boolean }
        protected_asset: { type: boolean }
        requested_at: { type: string }
      required: [target, severity, tier, dry_run, protected_asset, requested_at]

    ResponseDryRunResult:
      type: object
      properties:
        request_id: { type: string }
        would_execute: { type: boolean }
        tier: { $ref: "#/components/schemas/ResponseActionTier" }
        blast_radius:
          allOf:
            - { $ref: "#/components/schemas/ResponseBlastRadius" }
          nullable: true
        is_protected: { type: boolean }
        approvals_required: { type: integer, minimum: 0 }
      required: [request_id, would_execute, tier, blast_radius, is_protected, approvals_required]

    ResponseRequestRecord:
      type: object
      properties:
        id: { type: string }
        action: { type: string }
        action_label: { type: string }
        target: { $ref: "#/components/schemas/ResponseTarget" }
        target_hostname: { type: string }
        target_agent_uid:
          type: string
          nullable: true
        tier: { $ref: "#/components/schemas/ResponseActionTier" }
        status: { $ref: "#/components/schemas/ResponseRequestStatus" }
        created_at: { type: string }
        requested_at: { type: string }
        requested_by: { type: string }
        reason: { type: string }
        severity: { type: string }
        approvals:
          type: array
          items: { $ref: "#/components/schemas/ResponseApprovalRecord" }
        approval_count: { type: integer, minimum: 0 }
        approvals_required: { type: integer, minimum: 0 }
        dry_run: { type: boolean }
        is_protected_asset: { type: boolean }
        blast_radius:
          allOf:
            - { $ref: "#/components/schemas/ResponseBlastRadius" }
          nullable: true
        blast_radius_summary:
          type: string
          nullable: true
        input_context: { $ref: "#/components/schemas/ResponseRequestInputContext" }
        dry_run_result:
          allOf:
            - { $ref: "#/components/schemas/ResponseDryRunResult" }
          nullable: true
        execution_result:
          type: string
          nullable: true
        reversal_path: { type: string }
      required: [id, action, action_label, target, target_hostname, target_agent_uid, tier, status, created_at, requested_at, requested_by, reason, severity, approvals, approval_count, approvals_required, dry_run, is_protected_asset, blast_radius, blast_radius_summary, input_context, dry_run_result, execution_result, reversal_path]

    ResponseRequestsResponse:
      type: object
      properties:
        requests:
          type: array
          items: { $ref: "#/components/schemas/ResponseRequestRecord" }
        count: { type: integer, minimum: 0 }
        ready_to_execute: { type: integer, minimum: 0 }
      required: [requests, count, ready_to_execute]

    ResponseRequestCreateRequest:
      type: object
      properties:
        action:
          type: string
          enum: [alert, isolate, throttle, kill_process, quarantine_file, block_ip, disable_account, rollback_config, custom]
        hostname: { type: string }
        target_hostname: { type: string }
        agent_uid: { type: string }
        asset_tags:
          type: array
          items: { type: string }
        reason: { type: string }
        severity: { type: string }
        dry_run: { type: boolean }
        rate_limit_kbps: { type: integer, minimum: 0 }
        pid: { type: integer, minimum: 0 }
        process_name: { type: string }
        path: { type: string }
        ip: { type: string }
        username: { type: string }
        config_name: { type: string }
        name: { type: string }
        payload: { type: string }
      anyOf:
        - required: [action, hostname]
        - required: [action, target_hostname]

    ResponseRequestSubmissionResponse:
      type: object
      properties:
        status: { type: string }
        request: { $ref: "#/components/schemas/ResponseRequestRecord" }
      required: [status, request]

    ResponseApproveRequest:
      type: object
      properties:
        request_id: { type: string }
        decision:
          type: string
          enum: [approved, denied]
        approver: { type: string }
        reason: { type: string }
      required: [request_id, decision]

    ResponseApprovalResponse:
      type: object
      properties:
        request_id: { type: string }
        decision: { $ref: "#/components/schemas/ResponseApprovalDecision" }
        status:
          type: string
          enum: [Pending, Approved, Denied, DryRunCompleted]
        approvals: { type: integer, minimum: 0 }
      required: [request_id, decision, status, approvals]

    ResponseExecuteRequest:
      type: object
      properties:
        request_id: { type: string }

    ResponseExecuteResponse:
      type: object
      properties:
        executed_count: { type: integer, minimum: 0 }
        actions:
          type: array
          items: { type: string }
      required: [executed_count, actions]

    CasesStatsResponse:
      type: object
      properties:
        total: { type: integer, minimum: 0 }
        open: { type: integer, minimum: 0 }
        resolved: { type: integer, minimum: 0 }
        triaging: { type: integer, minimum: 0 }
        investigating: { type: integer, minimum: 0 }
        escalated: { type: integer, minimum: 0 }
      required: [total, open, resolved, triaging, investigating, escalated]

    PlatformCapabilitiesResponse:
      type: object
      properties:
        platform: { type: string }
        has_tpm: { type: boolean }
        has_seccomp: { type: boolean }
        has_ebpf: { type: boolean }
        has_firewall: { type: boolean }
        max_threads: { type: integer, minimum: 0 }
      required: [platform, has_tpm, has_seccomp, has_ebpf, has_firewall, max_threads]

    FeedPollResult:
      type: object
      properties:
        feed_id: { type: string }
        new_iocs: { type: integer, minimum: 0 }
        updated_iocs: { type: integer, minimum: 0 }
        new_hashes: { type: integer, minimum: 0 }
        new_yara_rules: { type: integer, minimum: 0 }
        errors:
          type: array
          items: { type: string }
        poll_time_ms: { type: integer, minimum: 0 }
        timestamp: { type: string }
      required: [feed_id, new_iocs, updated_iocs, new_hashes, new_yara_rules, errors, poll_time_ms, timestamp]

    FeedIngestionStatsResponse:
      type: object
      properties:
        total_sources: { type: integer, minimum: 0 }
        active_sources: { type: integer, minimum: 0 }
        total_polls: { type: integer, minimum: 0 }
        total_iocs_ingested: { type: integer, minimum: 0 }
        total_hashes_imported: { type: integer, minimum: 0 }
        total_yara_imported: { type: integer, minimum: 0 }
        last_poll_results:
          type: array
          items: { $ref: "#/components/schemas/FeedPollResult" }
        errors_last_24h: { type: integer, minimum: 0 }
      required: [total_sources, active_sources, total_polls, total_iocs_ingested, total_hashes_imported, total_yara_imported, last_poll_results, errors_last_24h]

    IoCEnrichmentStats:
      type: object
      properties:
        total_iocs: { type: integer, minimum: 0 }
        by_type:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        by_severity:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        by_source:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        avg_confidence: { type: number }
        active_feeds: { type: integer, minimum: 0 }
        total_feeds: { type: integer, minimum: 0 }
        match_history_size: { type: integer, minimum: 0 }
      required: [total_iocs, by_type, by_severity, by_source, avg_confidence, active_feeds, total_feeds, match_history_size]

    TriageLabel:
      type: string
      enum: [TruePositive, FalsePositive, NeedsReview]

    TriageFeatures:
      type: object
      properties:
        anomaly_score: { type: number }
        confidence: { type: number }
        suspicious_axes: { type: integer }
        hour_of_day: { type: integer }
        day_of_week: { type: integer }
        alert_frequency_1h: { type: integer }
        device_risk_score: { type: number }
      required: [anomaly_score, confidence, suspicious_axes, hour_of_day, day_of_week, alert_frequency_1h, device_risk_score]

    TriageResult:
      type: object
      properties:
        label: { $ref: "#/components/schemas/TriageLabel" }
        confidence: { type: number }
        model_version: { type: string }
      required: [label, confidence, model_version]

    ConfidenceCalibration:
      type: object
      properties:
        raw_confidence: { type: number }
        calibrated_confidence: { type: number }
        band: { type: string }
      required: [raw_confidence, calibrated_confidence, band]

    ManagedTriageOutcome:
      type: object
      properties:
        result: { $ref: "#/components/schemas/TriageResult" }
        shadow:
          allOf:
            - { $ref: "#/components/schemas/TriageResult" }
          nullable: true
        fallback_used: { type: boolean }
        active_backend: { type: string }
        shadow_backend: { type: string, nullable: true }
        calibration: { $ref: "#/components/schemas/ConfidenceCalibration" }
        rationale:
          type: array
          items: { type: string }
      required: [result, fallback_used, active_backend, calibration, rationale]

    MlShadowRecentResponse:
      type: object
      properties:
        count: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/ShadowInferenceRecord" }
      required: [count, items]

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window
      schema: { type: integer, example: 600 }
    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema: { type: integer, example: 594 }
    X-RateLimit-Reset:
      description: UTC epoch seconds when the window resets
      schema: { type: integer, example: 1712592000 }

  responses:
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
        X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
        X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
        Retry-After: { description: Seconds until next allowed request, schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/RateLimitError" }

