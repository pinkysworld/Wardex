    post:
      tags: [Administration]
      summary: Roll back the most recent database migration
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Migration rolled back successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDbRollbackResponse" }
              example:
                status: rolled_back
                version: 3
                current_version: 2

