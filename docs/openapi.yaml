          application/json:
            schema: { $ref: "#/components/schemas/AdminDbResetRequest" }
      responses:
        "200":
          description: Database reset result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDbResetResponse" }
              example:
                status: completed
                records_purged: 128
                timestamp: 2026-05-01T10:10:00Z

