      responses:
        "200":
          description: Database compaction result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDbCompactResponse" }
              example:
                status: completed
                size_before_bytes: 2097152
                size_after_bytes: 1572864
                bytes_reclaimed: 524288
                timestamp: 2026-05-01T10:10:00Z

