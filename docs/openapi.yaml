    get:
      tags: [Administration]
      summary: Return SQLite database file sizes
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Database file sizes and aggregate usage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDbSizesResponse" }
              example:
                db_bytes: 1048576
                wal_bytes: 65536
                shm_bytes: 32768
                total_bytes: 1146880

