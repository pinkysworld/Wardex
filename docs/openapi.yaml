              schema: { $ref: "#/components/schemas/AdminDbVersionResponse" }
              example:
                current_version: 3
                migrations:
                  - version: 1
                    name: initial_schema
                    sql_up: ""
                    sql_down: ""
                    applied_at: 2026-05-01T00:00:00Z

