              type: object
              properties:
                hive: { type: string }
                value_name: { type: string }
              required: [hive, value_name]
          required: [RegistryRunKey]
        - type: object
          properties:
            ScheduledTask:
              type: object
              properties:
                name: { type: string }
              required: [name]
          required: [ScheduledTask]
        - type: object
          properties:
            WmiSubscription:
              type: object
              properties:
                name: { type: string }
              required: [name]
          required: [WmiSubscription]
        - type: object
          properties:
