paths:
  # ── Health & Status ────────────────────────────────────────
  /api/health:
    get:
      tags: [Health]
      summary: Server health check
      security: []
      responses:
        "200":
          description: Server health info
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  version: { type: string }
                  uptime: { type: string }
                  platform: { type: string }
              example:
                status: ok
                version: "0.55.1"
                uptime: "4h 12m 3s"
                platform: aarch64-apple-darwin
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/healthz/live:
    get:
      tags: [Health]
      summary: Kubernetes liveness probe
      security: []
      responses:
        "200":
          description: Server process is alive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthLiveResponse" }

  /api/healthz/ready:
    get:
      tags: [Health]
      summary: Kubernetes readiness probe
      security: []
      responses:
        "200":
          description: Server dependencies are ready
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthReadyResponse" }
        "503":
          description: Server dependencies are not ready
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthReadyResponse" }

  /api/fleet/health:
    get:
      tags: [Fleet]
      summary: Bulk fleet health summary
      operationId: getFleetHealth
      responses:
        "200":
          description: Fleet health stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_agents: { type: integer }
                  online: { type: integer }
                  status: { type: string, enum: [healthy, degraded, critical] }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/feature-flags:
    get:
      tags: [FeatureFlags]
      summary: List feature flags
      operationId: listFeatureFlags
      responses:
        "200":
          description: Flag list
          content:
            application/json:
              schema:
                type: object
                properties:
                  flags:
                    type: array
                    items: { $ref: "#/components/schemas/FeatureFlag" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/status:
    get:
      tags: [Health]
      summary: Runtime status manifest
      responses:
        "200":
          description: Full status manifest
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusManifest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/endpoints:
    get:
      tags: [Health]
      summary: Self-describing endpoint listing
      responses:
        "200":
          description: List of all API endpoints

  /api/openapi.json:
    get:
      tags: [OpenAPI]
      summary: OpenAPI specification (JSON)
      security: []
      responses:
        "200":
          description: OpenAPI 3.0 specification
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpenApiSpecDocument" }

  /api/support/parity:
    get:
      tags: [Support]
      summary: Runtime API and SDK parity snapshot
      responses:
        "200":
          description: Current runtime, REST, GraphQL, and SDK alignment summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupportParityResponse" }

  /api/support/diagnostics:
    get:
      tags: [Support]
      summary: Operational support diagnostics bundle
      responses:
        "200":
          description: Support diagnostics across auth, content, operations, dependencies, and change control
          content:
            application/json:
