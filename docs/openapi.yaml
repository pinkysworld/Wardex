openapi: "3.0.3"
info:
  title: Wardex XDR Platform API
  description: |
    Comprehensive REST API for the Wardex XDR/SIEM platform.
    All mutating endpoints and sensitive monitoring endpoints require
    Bearer token authentication via the `Authorization` header.
    Agent-facing enrollment and heartbeat endpoints bypass admin auth.
  version: "0.55.1"
  contact:
    name: Wardex Project
  license:
    name: BSL 1.1

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API token printed by the server at startup

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code
          enum: [VALIDATION_ERROR, AUTH_REQUIRED, FORBIDDEN, NOT_FOUND, CONFLICT, PAYLOAD_TOO_LARGE, RATE_LIMITED, INTERNAL_ERROR, SERVICE_UNAVAILABLE, ERROR]
      required: [error, code]

    RateLimitError:
      type: object
      properties:
        error: { type: string, example: rate limit exceeded }
        retry_after_secs: { type: integer, example: 30 }

    StatusManifest:
      type: object
      properties:
        updated_at: { type: string, format: date-time }
        backlog_completed: { type: integer }
        backlog_total: { type: integer }
        completed_phases: { type: integer }
        total_phases: { type: integer }
        cli_commands: { type: array, items: { type: string } }
        implemented: { type: array, items: { type: string } }
        not_implemented: { type: array, items: { type: string } }

    HealthLiveResponse:
      type: object
      properties:
        status:
          type: string
          enum: [alive]
      required: [status]

    HealthReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        storage:
          type: string
          enum: [ok, unreachable]
      required: [status, storage]

    TelemetrySample:
      type: object
      properties:
        cpu: { type: number }
        memory: { type: number }
        network: { type: integer }
        disk: { type: number }
        auth_failures: { type: integer }
        temperature: { type: number }
        processes: { type: integer }
        battery: { type: number }
        timestamp: { type: string }

    EntityType:
      type: string
      enum: [IpAddress, Domain, FilePath, ProcessName, Port, HashSha256, HashMd5, MitreTechnique, Username, Hostname]

    ExtractedEntity:
      type: object
      properties:
        entity_type: { $ref: "#/components/schemas/EntityType" }
        value: { type: string }
        start: { type: integer, minimum: 0 }
        end: { type: integer, minimum: 0 }
      required: [entity_type, value, start, end]

    AlertProcessResolution:
      type: string
      enum: [none, unique, multiple, remote_host, unresolved]

    AlertProcessPivot:
      type: object
      properties:
        pid: { type: integer, minimum: 0 }
        ppid: { type: integer, minimum: 0, nullable: true }
        name: { type: string }
        display_name: { type: string }
        user: { type: string, nullable: true }
        group: { type: string, nullable: true }
        cpu_percent: { type: number, nullable: true }
        mem_percent: { type: number, nullable: true }
        hostname: { type: string }
        platform: { type: string }
        cmd_line: { type: string, nullable: true }
        exe_path: { type: string, nullable: true }
      required: [pid, name, display_name, hostname, platform]

    AlertSeverityCounts:
      type: object
      properties:
        total: { type: integer, minimum: 0 }
        critical: { type: integer, minimum: 0 }
        severe: { type: integer, minimum: 0 }
        elevated: { type: integer, minimum: 0 }
      required: [total, critical, severe, elevated]

    AlertDetailAnalysis:
      type: object
      properties:
        severity_class: { type: string, enum: [critical, severe, elevated] }
        multi_axis: { type: boolean }
        axis_count: { type: integer, minimum: 0 }
        recommendation: { type: string }
      required: [severity_class, multi_axis, axis_count, recommendation]

    AlertDetail:
      type: object
      properties:
        id: { type: integer, minimum: 0 }
        index: { type: integer, minimum: 0 }
        timestamp: { type: string }
        hostname: { type: string }
        platform: { type: string }
        score: { type: number }
        confidence: { type: number }
        level: { type: string }
        action: { type: string }
        reasons:
          type: array
          items: { type: string }
        enforced: { type: boolean }
        sample: { $ref: "#/components/schemas/EventTelemetrySample" }
        analysis: { $ref: "#/components/schemas/AlertDetailAnalysis" }
      required: [id, index, timestamp, hostname, platform, score, confidence, level, action, reasons, enforced, sample, analysis]

    AlertPattern:
      oneOf:
        - type: string
          enum: [Baseline, Escalating, Mixed]
        - type: object
          properties:
            PeriodicBursts:
              type: object
              properties:
                avg_interval_secs: { type: number }
                burst_severity: { type: string }
              required: [avg_interval_secs, burst_severity]
          required: [PeriodicBursts]
        - type: object
          properties:
            Sustained:
              type: object
              properties:
                severity: { type: string }
              required: [severity]
          required: [Sustained]

    ScoreTrend:
      oneOf:
        - type: string
          enum: [Stable, Volatile]
        - type: object
          properties:
            Rising:
              type: object
              properties:
                slope: { type: number }
              required: [slope]
          required: [Rising]
        - type: object
          properties:
            Falling:
              type: object
              properties:
                slope: { type: number }
              required: [slope]
          required: [Falling]

    AlertReasonCount:
      type: array
      minItems: 2
      maxItems: 2
      items:
        oneOf:
          - type: string
          - type: integer

    AlertCluster:
      type: object
      properties:
        start: { type: string }
        end: { type: string }
        count: { type: integer, minimum: 0 }
        avg_score: { type: number }
        max_score: { type: number }
        representative_reasons:
          type: array
          items: { type: string }
        level: { type: string }
      required: [start, end, count, avg_score, max_score, representative_reasons, level]

    AlertAnomaly:
      type: object
      properties:
        index: { type: integer, minimum: 0 }
        timestamp: { type: string }
        score: { type: number }
        reasons:
          type: array
          items: { type: string }
        deviation_from_mean: { type: number }
      required: [index, timestamp, score, reasons, deviation_from_mean]

    SeverityBreakdown:
      type: object
      properties:
        critical: { type: integer, minimum: 0 }
        severe: { type: integer, minimum: 0 }
        elevated: { type: integer, minimum: 0 }
      required: [critical, severe, elevated]

    IsolationGuidance:
      type: object
      properties:
        reason: { type: string }
        threat_description: { type: string }
        steps:
          type: array
          items: { type: string }
      required: [reason, threat_description, steps]

    AlertAnalysis:
      type: object
      properties:
        window_start: { type: string }
        window_end: { type: string }
        total_alerts: { type: integer, minimum: 0 }
        pattern: { $ref: "#/components/schemas/AlertPattern" }
        score_trend: { $ref: "#/components/schemas/ScoreTrend" }
        dominant_reasons:
          type: array
          items: { $ref: "#/components/schemas/AlertReasonCount" }
        clusters:
          type: array
          items: { $ref: "#/components/schemas/AlertCluster" }
        anomalies:
          type: array
          items: { $ref: "#/components/schemas/AlertAnomaly" }
        severity_breakdown: { $ref: "#/components/schemas/SeverityBreakdown" }
        isolation_guidance:
          type: array
          items: { $ref: "#/components/schemas/IsolationGuidance" }
        summary: { type: string }
      required: [window_start, window_end, total_alerts, pattern, score_trend, dominant_reasons, clusters, anomalies, severity_breakdown, isolation_guidance, summary]

    AlertAnalysisRequest:
      type: object
      properties:
        window_minutes: { type: integer, minimum: 0 }

    AlertGroup:
      type: object
      properties:
        id: { type: integer, minimum: 0 }
        first_seen: { type: string }
        last_seen: { type: string }
        count: { type: integer, minimum: 0 }
        avg_score: { type: number }
        max_score: { type: number }
        level: { type: string }
        reason_fingerprint: { type: string }
        representative_reasons:
          type: array
          items: { type: string }
        indices:
          type: array
          items: { type: integer, minimum: 0 }
      required: [id, first_seen, last_seen, count, avg_score, max_score, level, reason_fingerprint, representative_reasons, indices]

    SampleAlertSeverity:
      type: string
      enum: [elevated, severe, critical]

    SampleAlertRequest:
      type: object
      properties:
        severity: { $ref: "#/components/schemas/SampleAlertSeverity" }

    SampleAlertResponse:
      type: object
      properties:
        status: { type: string, enum: [injected] }
        severity: { $ref: "#/components/schemas/SampleAlertSeverity" }
        score: { type: number }
      required: [status, severity, score]

    AlertBulkActionRequest:
      type: object
      properties:
        ids:
          type: array
          maxItems: 1000
          items: { type: string }
      required: [ids]

    AlertBulkAcknowledgeResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        acknowledged: { type: integer, minimum: 0 }
        not_found: { type: integer, minimum: 0 }
        total_requested: { type: integer, minimum: 0 }
      required: [status, acknowledged, not_found, total_requested]

    AlertBulkResolveResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        resolved: { type: integer, minimum: 0 }
        not_found: { type: integer, minimum: 0 }
        total_requested: { type: integer, minimum: 0 }
      required: [status, resolved, not_found, total_requested]

    AlertBulkCloseResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        closed: { type: integer, minimum: 0 }
        not_found: { type: integer, minimum: 0 }
        total_requested: { type: integer, minimum: 0 }
      required: [status, closed, not_found, total_requested]

    ClearAlertsResponse:
      type: object
      properties:
        status: { type: string, enum: [cleared] }
        count: { type: integer, minimum: 0 }
      required: [status, count]

    DedupAutoCreateResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        created_incidents:
          type: array
          items: { type: string }
        count: { type: integer, minimum: 0 }
      required: [status, created_incidents, count]

    DetectionEvidence:
      type: object
      properties:
        kind: { type: string }
        label: { type: string }
        value: { type: string }
        confidence: { type: number, nullable: true }
        source: { type: string, nullable: true }
      required: [kind, label, value]

    DetectionFeedback:
      type: object
      properties:
        id: { type: integer, minimum: 0 }
        event_id: { type: integer, minimum: 0, nullable: true }
        alert_id: { type: string, nullable: true }
        rule_id: { type: string, nullable: true }
        analyst: { type: string }
        verdict: { type: string }
        reason_pattern: { type: string, nullable: true }
        notes: { type: string }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/DetectionEvidence" }
        created_at: { type: string }
      required: [id, analyst, verdict, notes, evidence, created_at]

    DetectionFeedbackCreateRequest:
      type: object
      properties:
        event_id: { type: integer, minimum: 0, nullable: true }
        alert_id: { type: string, nullable: true }
        rule_id: { type: string, nullable: true }
        analyst: { type: string, nullable: true }
        verdict: { type: string }
        reason_pattern: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/DetectionEvidence" }
      required: [verdict]

    EntityRiskScore:
      type: object
      properties:
        entity_kind: { type: string }
        entity_id: { type: string }
        score: { type: number }
        confidence: { type: number }
        rationale:
          type: array
          items: { type: string }
      required: [entity_kind, entity_id, score, confidence, rationale]

    DetectionFeedbackSummary:
      type: object
      properties:
        total: { type: integer, minimum: 0 }
        by_verdict:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        analysts: { type: integer, minimum: 0 }
      required: [total, by_verdict, analysts]

    DetectionFeedbackListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DetectionFeedback" }
        summary: { $ref: "#/components/schemas/DetectionFeedbackSummary" }
      required: [items, summary]

    DetectionExplainability:
      type: object
      properties:
        event_id: { type: integer, minimum: 0, nullable: true }
        alert_id: { type: string, nullable: true }
        severity: { type: string }
        title: { type: string }
        summary:
          type: array
          items: { type: string }
        why_fired:
          type: array
          items: { type: string }
        why_safe_or_noisy:
          type: array
          items: { type: string }
        next_steps:
          type: array
          items: { type: string }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/DetectionEvidence" }
        entity_scores:
          type: array
          items: { $ref: "#/components/schemas/EntityRiskScore" }
        triage_status: { type: string, nullable: true }
        related_cases:
          type: array
          items: { type: string }
        feedback:
          type: array
          items: { $ref: "#/components/schemas/DetectionFeedback" }
      required: [severity, title, summary, why_fired, why_safe_or_noisy, next_steps, evidence, entity_scores, related_cases, feedback]

    DetectionProfileName:
      type: string
      enum: [aggressive, balanced, quiet]

    DetectionProfileResponse:
      type: object
      properties:
        profile: { $ref: "#/components/schemas/DetectionProfileName" }
        description: { type: string }
        threshold_multiplier: { type: number }
        learn_threshold: { type: number }
      required: [profile, description, threshold_multiplier, learn_threshold]

    SetDetectionProfileRequest:
      type: object
      properties:
        profile: { $ref: "#/components/schemas/DetectionProfileName" }
      required: [profile]

    SetDetectionProfileResponse:
      type: object
      properties:
        profile: { $ref: "#/components/schemas/DetectionProfileName" }
        applied: { type: boolean }
      required: [profile, applied]

    NormalizedScore:
      type: object
      properties:
        raw_score: { type: number }
        normalized: { type: integer, minimum: 0, maximum: 100 }
        severity: { type: string, enum: [info, low, medium, high, critical] }
        confidence: { type: string, enum: [low, medium, high] }
      required: [raw_score, normalized, severity, confidence]

    EndpointMetrics:
      type: object
      properties:
        path: { type: string }
        method: { type: string }
        request_count: { type: integer, minimum: 0 }
        error_count: { type: integer, minimum: 0 }
        avg_latency_ms: { type: number }
        p95_latency_ms: { type: number }
      required: [path, method, request_count, error_count, avg_latency_ms, p95_latency_ms]

    AnalyticsSummary:
      type: object
      properties:
        total_requests: { type: integer, minimum: 0 }
        total_errors: { type: integer, minimum: 0 }
        error_rate: { type: number }
        unique_endpoints: { type: integer, minimum: 0 }
        top_endpoints:
          type: array
          items: { $ref: "#/components/schemas/EndpointMetrics" }
      required: [total_requests, total_errors, error_rate, unique_endpoints, top_endpoints]

    SpanStatus:
      type: string
      enum: [Unset, Ok, Error]

    TraceAttribute:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: string

    OtelSpan:
      type: object
      properties:
        trace_id: { type: string }
        span_id: { type: string }
        parent_span_id: { type: string, nullable: true }
        operation_name: { type: string }
        service_name: { type: string }
        start_time_ms: { type: integer, minimum: 0 }
        end_time_ms: { type: integer, minimum: 0, nullable: true }
        status: { $ref: "#/components/schemas/SpanStatus" }
        attributes:
          type: array
          items: { $ref: "#/components/schemas/TraceAttribute" }
      required: [trace_id, span_id, operation_name, service_name, start_time_ms, status, attributes]

    TraceStats:
      type: object
      properties:
        total_spans: { type: integer, minimum: 0 }
        error_spans: { type: integer, minimum: 0 }
        avg_duration_ms: { type: number }
      required: [total_spans, error_spans, avg_duration_ms]

    TracesResponse:
      type: object
      properties:
        stats: { $ref: "#/components/schemas/TraceStats" }
        recent:
          type: array
          items: { $ref: "#/components/schemas/OtelSpan" }
      required: [stats, recent]

    BackupEncryptRequest:
      type: object
      properties:
        data: { type: string }
        passphrase: { type: string, minLength: 1 }
      required: [data, passphrase]

    BackupEncryptResponse:
      type: object
      properties:
        encrypted: { type: string }
        size: { type: integer, minimum: 0 }
      required: [encrypted, size]

    BackupDecryptRequest:
      type: object
      properties:
        data:
          type: string
          description: Base64-encoded encrypted data
        passphrase: { type: string, minLength: 1 }
      required: [data, passphrase]

    BackupDecryptResponse:
      type: object
      properties:
        data: { type: string }
        size: { type: integer, minimum: 0 }
      required: [data, size]

    BackupRecord:
      type: object
      properties:
        name: { type: string }
        timestamp: { type: string, format: date-time }
        size_bytes: { type: integer, minimum: 0 }
        checksum: { type: string }
        verified: { type: boolean }
      required: [name, timestamp, size_bytes, checksum, verified]

    BackupStatus:
      type: object
      properties:
        enabled: { type: boolean }
        retention_count: { type: integer, minimum: 0 }
        path: { type: string }
        schedule_cron: { type: string }
      required: [enabled, retention_count, path, schedule_cron]

    AdminBackupResponse:
      type: object
      properties:
        status: { type: string }
        path: { type: string }
        timestamp: { type: string, format: date-time }
      required: [status, path, timestamp]

    AdminDbMigration:
      type: object
      properties:
        version: { type: integer, minimum: 0 }
        name: { type: string }
        sql_up: { type: string }
        sql_down: { type: string }
        applied_at: { type: string, format: date-time, nullable: true }
      required: [version, name, sql_up, sql_down]

    AdminDbVersionResponse:
      type: object
      properties:
        current_version: { type: integer, minimum: 0 }
        migrations:
          type: array
          items: { $ref: "#/components/schemas/AdminDbMigration" }
      required: [current_version, migrations]

    AdminDbSizesResponse:
      type: object
      properties:
        db_bytes: { type: integer, minimum: 0 }
        wal_bytes: { type: integer, minimum: 0 }
        shm_bytes: { type: integer, minimum: 0 }
        total_bytes: { type: integer, minimum: 0 }
      required: [db_bytes, wal_bytes, shm_bytes, total_bytes]

    AdminDbRollbackResponse:
      type: object
      properties:
        status: { type: string }
        version: { type: integer, minimum: 0 }
        current_version: { type: integer, minimum: 0 }
      required: [status, version, current_version]

    AdminDbCompactResponse:
      type: object
      properties:
        status: { type: string }
        size_before_bytes: { type: integer, minimum: 0 }
        size_after_bytes: { type: integer, minimum: 0 }
        bytes_reclaimed: { type: integer, minimum: 0 }
        timestamp: { type: string, format: date-time }
      required: [status, size_before_bytes, size_after_bytes, bytes_reclaimed, timestamp]

    AdminDbResetRequest:
      type: object
      properties:
        confirm: { type: string }
      required: [confirm]

    AdminDbResetResponse:
      type: object
      properties:
        status: { type: string }
        records_purged: { type: integer, minimum: 0 }
        timestamp: { type: string, format: date-time }
      required: [status, records_purged, timestamp]

    AdminDbPurgeRequest:
      type: object
      properties:
        retention_days: { type: integer, minimum: 1 }
      required: [retention_days]

    AdminDbPurgeResponse:
      type: object
      properties:
        status: { type: string }
        retention_days: { type: integer, minimum: 1 }
        alerts_purged: { type: integer, minimum: 0 }
        audit_purged: { type: integer, minimum: 0 }
        metrics_purged: { type: integer, minimum: 0 }
        timestamp: { type: string, format: date-time }
      required: [status, retention_days, alerts_purged, audit_purged, metrics_purged, timestamp]

    AdminCleanupLegacyResponse:
      type: object
      properties:
        status: { type: string }
        files_removed:
          type: array
          items: { type: string }
        count: { type: integer, minimum: 0 }
        timestamp: { type: string, format: date-time }
      required: [status, files_removed, count, timestamp]

    SbomHash:
      type: object
      properties:
        alg: { type: string }
        content: { type: string }
      required: [alg, content]

    SbomLicense:
      type: object
      properties:
        license:
          type: object
          properties:
            id: { type: string }
          required: [id]
      required: [license]

    SbomComponent:
      type: object
      properties:
        type:
          type: string
          enum: [library, application, framework, device, firmware]
        name: { type: string }
        version: { type: string }
        purl: { type: string }
        licenses:
          type: array
          items: { $ref: "#/components/schemas/SbomLicense" }
        hashes:
          type: array
          items: { $ref: "#/components/schemas/SbomHash" }
      required: [type, name, version, purl]

    SbomDependency:
      type: object
      properties:
        ref: { type: string }
        dependsOn:
          type: array
          items: { type: string }
      required: [ref, dependsOn]

    SbomMetadataTool:
      type: object
      properties:
        name: { type: string }
        version: { type: string }
      required: [name, version]

    SbomMetadataComponent:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        version: { type: string }
      required: [type, name, version]

    SbomMetadata:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        tools:
          type: array
          items: { $ref: "#/components/schemas/SbomMetadataTool" }
        component: { $ref: "#/components/schemas/SbomMetadataComponent" }
      required: [timestamp, tools, component]

    SbomDocument:
      type: object
      properties:
        bomFormat:
          type: string
          enum: [CycloneDX]
        specVersion: { type: string }
        serialNumber: { type: string }
        version: { type: integer, minimum: 0 }
        metadata: { $ref: "#/components/schemas/SbomMetadata" }
        components:
          type: array
          items: { $ref: "#/components/schemas/SbomComponent" }
        dependencies:
          type: array
          items: { $ref: "#/components/schemas/SbomDependency" }
      required: [bomFormat, specVersion, serialNumber, version, metadata, components, dependencies]

    PiiScanResponse:
      type: object
      properties:
        has_pii: { type: boolean }
        finding_count: { type: integer, minimum: 0 }
        categories:
          type: array
          items: { type: string }
      required: [has_pii, finding_count, categories]

    LicenseStatusResponse:
      type: object
      properties:
        status: { type: string }
        edition: { type: string }
        features:
          type: array
          items: { type: string }
        max_agents: { type: integer, minimum: 0 }
        expires: { type: string, format: date-time }
      required: [status, edition, features, max_agents, expires]

    LicenseValidateRequest:
      type: object
      properties:
        key: { type: string }
      required: [key]

    LicenseValidateResponse:
      type: object
      properties:
        valid: { type: boolean }
        key_prefix: { type: string }
        validated_at: { type: string, format: date-time }
      required: [valid, key_prefix, validated_at]

    MeteringUsageResponse:
      type: object
      properties:
