                name: { type: string }
              required: [pid, name]
          required: [KillProcess]
        - type: object
          properties:
            QuarantineFile:
              type: object
              properties:
                path: { type: string }
              required: [path]
          required: [QuarantineFile]
        - type: object
          properties:
