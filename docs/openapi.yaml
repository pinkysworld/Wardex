      description: |
        Supports queries for alerts, agents, events, hunts, status, and
        introspection (__schema). Variables and aliases are supported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                variables: { type: object }
                operationName: { type: string }
      responses:
        "200":
          description: GraphQL response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: object }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message: { type: string }

