<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found — Wardex</title>
    <meta name="description" content="The page you were looking for doesn't exist. Head back to the Wardex overview.">
    <meta name="robots" content="noindex">
    <script>
      (function () {
        const trimmedPath = window.location.pathname.replace(/\/+$/, "");
        const segments = trimmedPath.split("/").filter(Boolean);
        const leaf = segments.at(-1) || "";
        const isSiteAlias = segments.at(-2) === "site";
        const redirectablePages = new Set([
          "api",
          "architecture",
          "changelog",
          "checkout",
          "comparison",
          "donate",
          "features",
          "integrations",
          "pricing",
          "resources",
          "rules",
          "status"
        ]);

        if (leaf === "site") {
          window.location.replace(`${trimmedPath}/index.html${window.location.search}${window.location.hash}`);
          return;
        }

        if (redirectablePages.has(leaf)) {
          const prefixSegments = isSiteAlias ? segments.slice(0, -2) : segments.slice(0, -1);
          const targetPath = `/${prefixSegments.concat(`${leaf}.html`).join("/")}`;
          window.location.replace(`${targetPath}${window.location.search}${window.location.hash}`);
          return;
        }

        let basePath = "/";

        if (!leaf) {
          basePath = "/";
        } else if (leaf.endsWith(".html")) {
          basePath = trimmedPath.slice(0, -(leaf.length + 1)) || "/";
        } else {
          basePath = segments.length > 1 ? `/${segments.slice(0, -1).join("/")}` : "/";
        }

        const base = document.createElement("base");
        base.href = `${basePath === "/" ? "/" : `${basePath}/`}`;
        document.head.appendChild(base);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=21">
    <script defer src="app.js?v=21"></script>
  </head>
  <body>
    <main class="main notfound">
      <div class="container">
        <div class="notfound-card">
          <p class="label">HTTP 404</p>
          <h1>That page is off-network.</h1>
          <p class="page-hero-desc">We couldn't find what you were looking for. It may have moved with a release, or the link is from an older version of the site.</p>
          <div class="notfound-actions">
            <a href="index.html" class="btn btn-primary">Back to overview</a>
            <a href="resources.html" class="btn btn-outline">Browse resources</a>
            <a href="https://github.com/pinkysworld/Wardex" class="btn btn-ghost" target="_blank" rel="noopener">Search on GitHub</a>
          </div>
          <ul class="notfound-links">
            <li><a href="features.html">Features</a></li>
            <li><a href="architecture.html">Architecture</a></li>
            <li><a href="pricing.html">Pricing</a></li>
            <li><a href="api.html">API reference</a></li>
            <li><a href="changelog.html">Changelog</a></li>
          </ul>
        </div>
      </div>
    </main>
  </body>
</html>
