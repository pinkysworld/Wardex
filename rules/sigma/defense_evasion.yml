title: Defense Evasion - Masquerading (Renamed System Binaries)
id: wdx-evasion-002
status: stable
level: medium
description: >
  Detects execution of renamed copies of system binaries, a common
  masquerading technique to bypass application whitelisting and EDR.
tags:
  - attack.defense_evasion
  - attack.t1036.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_hash_mismatch:
    OriginalFileName:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'rundll32.exe'
      - 'regsvr32.exe'
      - 'certutil.exe'
      - 'mshta.exe'
      - 'wscript.exe'
      - 'cscript.exe'
  filter_legit_path:
    Image|contains:
      - '\System32\'
      - '\SysWOW64\'
      - '\WindowsPowerShell\'
  condition: selection_hash_mismatch and not filter_legit_path
falsepositives:
  - Renamed copies in custom deployment directories
mitre:
  techniques:
    - T1036.003  # Rename System Utilities
    - T1036.005  # Match Legitimate Name or Location

---

title: Defense Evasion - Timestomping via touch or PowerShell
id: wdx-evasion-003
status: experimental
level: medium
description: Detects attempts to modify file timestamps to blend in with legitimate files.
tags:
  - attack.defense_evasion
  - attack.t1070.006
logsource:
  category: process_creation
detection:
  selection_powershell:
    CommandLine|contains:
      - 'CreationTime'
      - 'LastWriteTime'
      - 'LastAccessTime'
      - 'SetCreationTime'
  selection_touch:
    Image|endswith: '/touch'
    CommandLine|contains:
      - '-t '
      - '--date='
      - '-r '
  condition: selection_powershell or selection_touch
falsepositives:
  - Build systems adjusting timestamps
  - Backup restoration scripts
mitre:
  techniques:
    - T1070.006  # Timestomp
