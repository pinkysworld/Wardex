title: Exfiltration - Archive Creation Before Transfer
id: wdx-exfil-003
status: stable
level: medium
description: >
  Detects creation of compressed archives in temporary or user
  directories, commonly done before data exfiltration.
tags:
  - attack.collection
  - attack.t1560.001
  - attack.exfiltration
logsource:
  category: process_creation
detection:
  selection_archive:
    CommandLine|contains:
      - '7z a '
      - 'zip -r'
      - 'tar czf'
      - 'tar -czf'
      - 'rar a '
      - 'Compress-Archive'
  selection_sensitive_dirs:
    CommandLine|contains:
      - '\Users\'
      - '\Documents\'
      - '/home/'
      - '/etc/'
      - '\Desktop\'
      - '\Downloads\'
  condition: selection_archive and selection_sensitive_dirs
falsepositives:
  - Authorized backup procedures
  - Developers archiving project files
mitre:
  techniques:
    - T1560.001  # Archive via Utility
    - T1074.001  # Local Data Staging
