title: Exfiltration - Large Outbound Data Transfer
id: wdx-exfil-002
status: stable
level: medium
description: >
  Detects unusually large outbound data transfers that may indicate
  bulk data exfiltration. Requires network telemetry.
tags:
  - attack.exfiltration
  - attack.t1048
logsource:
  category: network_connection
detection:
  selection:
    Direction: outbound
    BytesSent|gte: 104857600  # 100MB threshold
  filter_known_services:
    DestinationHostname|endswith:
      - '.windowsupdate.com'
      - '.microsoft.com'
      - '.apple.com'
      - '.googleapis.com'
  condition: selection and not filter_known_services
falsepositives:
  - Legitimate large file uploads
  - Video conferencing
  - Cloud backup services
mitre:
  techniques:
    - T1048  # Exfiltration Over Alternative Protocol
    - T1029  # Scheduled Transfer

