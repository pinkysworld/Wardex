title: Unauthorized Cloud API Call
id: wardex-cloud-001
status: stable
level: high
description: Detects API calls to cloud management planes that are not in the approved action list.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.execution
  - attack.t1059.009
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: cloud_api
    action_authorized: false
  condition: selection
falsepositives:
  - New automation script
---
title: Cloud Resource Created in Unusual Region
id: wardex-cloud-002
status: stable
level: high
description: Detects cloud resources provisioned in regions not previously used by the organization.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.resource_development
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: resource_create
    region_first_seen: true
  condition: selection
falsepositives:
  - Planned multi-region expansion
---
title: IAM Policy Weakened
id: wardex-cloud-003
status: stable
level: critical
description: Detects IAM policy changes that broaden permissions or add wildcard access.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.privilege_escalation
  - attack.t1078.004
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: iam_policy_change
    permission_broadened: true
  condition: selection
falsepositives:
  - Approved policy migration
---
title: Cloud Storage Public Access Enabled
id: wardex-cloud-004
status: stable
level: critical
description: Detects a storage bucket or blob container being made publicly accessible.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.collection
  - attack.t1530
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: storage_acl_change
    public_access: true
  condition: selection
falsepositives:
  - Intentional public hosting
---
title: Unusual Data Download Volume from Cloud
id: wardex-cloud-005
status: stable
level: high
description: Detects download of large data volumes from cloud storage or databases.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.exfiltration
  - attack.t1530
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: data_access
    bytes_downloaded|gt: baseline_3sigma
  condition: selection
falsepositives:
  - Legitimate data migration
---
title: MFA Disabled for User
id: wardex-cloud-006
status: stable
level: critical
description: Detects MFA being disabled for a user account.
author: Wardex Contributors
date: 2025/06/01
tags:
  - attack.credential_access
  - attack.t1556
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: mfa_change
    mfa_enabled: false
  condition: selection
falsepositives:
  - MFA reset during account recovery
---
title: IAM Role Assumed by Unusual Principal
id: wardex-cloud-007
status: stable
level: high
description: Detects sts:AssumeRole calls from principals not previously seen assuming this role, indicating potential privilege escalation.
author: Wardex Contributors
date: 2025/06/15
tags:
  - attack.privilege_escalation
  - attack.t1078.004
  - wardex.cloud
  - wardex.aws
logsource:
  category: cloud
  product: wardex
  service: aws_cloudtrail
detection:
  selection:
    event_type: assume_role
    principal_first_seen: true
  condition: selection
falsepositives:
  - New automation service account
---
title: OAuth Application Granted High Privileges
id: wardex-cloud-008
status: stable
level: critical
description: Detects OAuth consent grants with high-privilege scopes (e.g. Directory.ReadWrite.All, Mail.ReadWrite) that could enable account takeover.
author: Wardex Contributors
date: 2025/06/15
tags:
  - attack.persistence
  - attack.t1098.003
  - wardex.cloud
  - wardex.azure
logsource:
  category: cloud
  product: wardex
  service: azure_audit
detection:
  selection:
    event_type: oauth_consent
    scope_level: high_privilege
  condition: selection
falsepositives:
  - Approved enterprise application
---
title: S3 Bucket Policy Changed to Allow Cross-Account Access
id: wardex-cloud-009
status: stable
level: critical
