title: Cloud Logging Disabled
id: wardex-cloud-010
status: stable
level: critical
description: Detects disabling of cloud audit logging (CloudTrail, GCP Audit, Azure Activity) which is a common defense evasion technique.
author: Wardex Contributors
date: 2025/06/15
tags:
  - attack.defense_evasion
  - attack.t1562.008
  - wardex.cloud
logsource:
  category: cloud
  product: wardex
detection:
  selection:
    event_type: logging_config_change
    logging_enabled: false
  condition: selection
falsepositives:
  - Logging migration
---
