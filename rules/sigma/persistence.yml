title: Persistence - Scheduled Task Created
id: wdx-persist-002
status: stable
level: medium
description: Detects creation of scheduled tasks which may be used for persistence.
tags:
  - attack.persistence
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\schtasks.exe'
    CommandLine|contains:
      - '/create'
      - '/change'
  filter_system:
    User|contains:
      - 'SYSTEM'
      - 'LOCAL SERVICE'
  condition: selection and not filter_system
falsepositives:
  - Admin maintenance scripts
  - Software update schedulers
mitre:
  techniques:
    - T1053.005  # Scheduled Task

---

title: Persistence - Systemd Service Creation (Linux)
id: wdx-persist-003
status: stable
level: medium
description: Detects new systemd service unit files being created, potentially for persistence.
tags:
  - attack.persistence
  - attack.t1543.002
logsource:
  category: file_event
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/systemd/system/'
      - '/usr/lib/systemd/system/'
      - '/lib/systemd/system/'
    TargetFilename|endswith:
      - '.service'
      - '.timer'
  condition: selection
falsepositives:
  - Package installations
  - Legitimate service deployments
mitre:
  techniques:
    - T1543.002  # Systemd Service

---

title: Persistence - macOS LaunchAgent/LaunchDaemon
id: wdx-persist-004
status: stable
level: medium
description: Detects creation of macOS persistence mechanisms via LaunchAgents or LaunchDaemons.
tags:
  - attack.persistence
  - attack.t1543.004
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - '/Library/LaunchAgents/'
      - '/Library/LaunchDaemons/'
      - '/LaunchAgents/'
    TargetFilename|endswith: '.plist'
  condition: selection
falsepositives:
  - Legitimate macOS application installations
mitre:
  techniques:
    - T1543.004  # Launch Agent
