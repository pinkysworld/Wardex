apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardex
  labels:
    app.kubernetes.io/name: wardex
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wardex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wardex
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9077"
        prometheus.io/path: "/api/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: wardex
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: wardex
          image: wardex:0.42.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9077
              protocol: TCP
          env:
            - name: WARDEX_BIND
              value: "0.0.0.0:9077"
            - name: WARDEX_DATA_DIR
              value: "/data"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/wardex
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wardex-data
        - name: config
          configMap:
            name: wardex-config
