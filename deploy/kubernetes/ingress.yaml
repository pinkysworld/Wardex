apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wardex
  labels:
    app.kubernetes.io/name: wardex
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wardex.example.com
      secretName: wardex-tls
  rules:
    - host: wardex.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wardex
                port:
                  name: http
