# Default values for Wardex Helm chart

replicaCount: 2

image:
  repository: wardex
  tag: "0.43.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9077"
  prometheus.io/path: "/api/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 9077

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: wardex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

config:
  server:
    bind: "0.0.0.0:9077"
    workers: 4
  detection:
    sensitivity: balanced
    auto_baseline: true
  storage:
    data_dir: /data
    retention_days: 90
  logging:
    level: info
    format: json

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  # scrapeTimeout: 10s
  # namespace: monitoring
  additionalLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
