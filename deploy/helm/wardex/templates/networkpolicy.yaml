{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wardex.fullname" . }}
  labels:
    {{- include "wardex.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wardex.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound traffic from within the namespace on the Wardex port
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    {{- range .Values.networkPolicy.ingressRules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.networkPolicy.allowClickHouseEgress }}
    # Allow egress to ClickHouse (default port 8123)
    - ports:
        - port: 8123
          protocol: TCP
    {{- end }}
    {{- range .Values.networkPolicy.egressRules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
