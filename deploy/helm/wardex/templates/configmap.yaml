apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wardex.fullname" . }}-config
  labels:
    {{- include "wardex.labels" . | nindent 4 }}
data:
  wardex.toml: |
    [server]
    bind = "{{ .Values.config.server.bind }}"
    workers = {{ .Values.config.server.workers }}

    [detection]
    sensitivity = "{{ .Values.config.detection.sensitivity }}"
    auto_baseline = {{ .Values.config.detection.auto_baseline }}

    [storage]
    data_dir = "{{ .Values.config.storage.data_dir }}"
    retention_days = {{ .Values.config.storage.retention_days }}

    [logging]
    level = "{{ .Values.config.logging.level }}"
    format = "{{ .Values.config.logging.format }}"
