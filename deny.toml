# cargo-deny configuration for Wardex
# Run: cargo install cargo-deny && cargo deny check

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0384", reason = "Transitive via tantivy/measure_time; no safe upgrade is currently available in the shipped dependency graph." },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8 remains in the graph via tantivy dependencies; track upstream until the tree can move to a fixed release." },
    { id = "RUSTSEC-2023-0071", reason = "Marvin Attack in rsa crate via jsonwebtoken; no patched version of jsonwebtoken is available that removes the rsa dependency." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "AGPL-3.0-only",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
