name: Site Quality

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build_changelog.py'
      - '.github/workflows/site-quality.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'scripts/build_changelog.py'
      - '.github/workflows/site-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y-and-lighthouse:
    name: Accessibility & Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          npm install --no-save --no-audit --no-fund \
            pa11y-ci@3.1.0 \
            @lhci/cli@0.14.0 \
            http-server@14.1.1

      - name: Build site preview (incl. changelog.html)
        run: |
          rm -rf site-build
          mkdir -p site-build
          cp -R site/. site-build/
          python3 scripts/build_changelog.py CHANGELOG.md site-build/changelog.html

      - name: Start static server
        run: |
          npx --yes http-server site-build -p 8765 -s --silent &
          echo $! > server.pid
          # Wait for the server to respond.
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8765/index.html > /dev/null; then
              break
            fi
            sleep 0.5
          done
          curl -sI http://localhost:8765/index.html | head -1

      - name: Run pa11y-ci (WCAG 2.1 AA)
        run: |
          npx pa11y-ci \
            --config .github/pa11yci.json \
            --json > pa11y-report.json || {
              status=$?
              echo "pa11y-ci exited with status $status"
              cat pa11y-report.json || true
              exit $status
            }
        continue-on-error: false

      - name: Run Lighthouse CI
        run: npx lhci autorun --config=.github/lighthouserc.json
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: site-quality-reports
          path: |
            pa11y-report.json
            .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop static server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi
