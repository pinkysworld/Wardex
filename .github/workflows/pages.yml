name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, e.g. v0.52.1
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install APT repository tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Assemble site artifact
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          rm -rf site-build
          mkdir -p site-build
          cp -R site/. site-build/

          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          selected_tag="${RELEASE_TAG}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_TAG}" ]]; then
            selected_tag="${INPUT_TAG}"
          fi
          if [[ -n "${selected_tag}" ]]; then
            release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${selected_tag}"
          fi

          if curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            "$release_api" \
            -o /tmp/wardex-release.json; then
            mapfile -t deb_urls < <(
              python3 -c 'import json, sys; release = json.load(open(sys.argv[1], encoding="utf-8")); [print(asset["browser_download_url"]) for asset in release.get("assets", []) if asset.get("name", "").endswith(".deb")]' /tmp/wardex-release.json
            )

            if [[ ${#deb_urls[@]} -gt 0 ]]; then
              if [[ -z "${APT_GPG_PRIVATE_KEY:-}" ]]; then
                echo "APT_GPG_PRIVATE_KEY secret is required when publishing Debian packages to the APT repository." >&2
                exit 1
              fi

              rm -rf /tmp/wardex-apt-assets
              mkdir -p /tmp/wardex-apt-assets

              for deb_url in "${deb_urls[@]}"; do
                curl --fail --silent --show-error --location --retry 5 --retry-delay 5 \
                  --output "/tmp/wardex-apt-assets/$(basename "$deb_url")" \
                  "$deb_url"
              done

              shopt -s nullglob
              debs=(/tmp/wardex-apt-assets/*.deb)
              shopt -u nullglob

              if [[ ${#debs[@]} -gt 0 ]]; then
                bash deploy/scripts/render_apt_repo.sh site-build/apt stable main "${debs[@]}"
              fi
            else
              echo "No Debian release assets found; skipping APT repo generation."
            fi
          else
            echo "No published release available; skipping APT repo generation."
          fi

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
