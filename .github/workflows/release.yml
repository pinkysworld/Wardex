name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build & Package — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl binary — runs on any distro) ─────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            archive: wardex-linux-x86_64.tar.gz
            extra_packages: musl-tools

          # ── macOS Apple Silicon (macos-latest = arm64) ──────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            archive: wardex-macos-aarch64.tar.gz

          # ── Windows ─────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive: wardex-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install extra packages (Linux)
        if: matrix.extra_packages != ''
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Linux / macOS) ──────────────────────────────────────────
      - name: Create package (Unix)
        if: runner.os != 'Windows'
        run: |
          PKG="wardex-${{ matrix.platform }}"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/wardex" "$PKG/wardex"
          chmod +x "$PKG/wardex"
          cp -r site "$PKG/site"
          cp -r examples "$PKG/examples"
          cp README.md LICENSE "$PKG/"
          tar -czf "${{ matrix.archive }}" "$PKG"
          echo "Package contents:"
          tar -tzf "${{ matrix.archive }}"

      # ── Package (Windows) ────────────────────────────────────────────────
      - name: Create package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "wardex-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\wardex.exe" "$pkg\wardex.exe"
          Copy-Item -Recurse site "$pkg\site"
          Copy-Item -Recurse examples "$pkg\examples"
          Copy-Item README.md, LICENSE "$pkg\"
          Compress-Archive -Path "$pkg\*" -DestinationPath "${{ matrix.archive }}"
          Write-Host "Package contents:"
          (Get-ChildItem -Recurse $pkg).FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ── Generate CycloneDX SBOM ──────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --output-file wardex-sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: wardex-sbom.cdx.json
          path: wardex-sbom.cdx.json

  # ── Lint Helm chart ──────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint deploy/helm/wardex/

  # ── Build deb & rpm packages ─────────────────────────────────────
  linux-packages:
    name: Build Linux Packages (deb/rpm)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: wardex-linux-x86_64.tar.gz
          path: .

      - name: Extract binary
        run: |
          tar -xzf wardex-linux-x86_64.tar.gz
          chmod +x wardex-linux-x86_64/wardex

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install fpm -N

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build deb package
        run: |
          fpm -s dir -t deb \
            --name wardex \
            --version "${{ steps.version.outputs.tag }}" \
            --architecture amd64 \
            --description "Wardex SentinelEdge XDR platform" \
            --url "https://github.com/${{ github.repository }}" \
            --license "BSL-1.1" \
            --maintainer "${{ github.repository_owner }}" \
            --after-install deploy/wardex.service \
            --deb-systemd deploy/wardex.service \
            wardex-linux-x86_64/wardex=/usr/bin/wardex \
            examples/=/usr/share/wardex/examples/ \
            README.md=/usr/share/doc/wardex/README.md \
            LICENSE=/usr/share/doc/wardex/LICENSE

      - name: Build rpm package
        run: |
          fpm -s dir -t rpm \
            --name wardex \
            --version "${{ steps.version.outputs.tag }}" \
            --architecture x86_64 \
            --description "Wardex SentinelEdge XDR platform" \
            --url "https://github.com/${{ github.repository }}" \
            --license "BSL-1.1" \
            --maintainer "${{ github.repository_owner }}" \
            wardex-linux-x86_64/wardex=/usr/bin/wardex \
            examples/=/usr/share/wardex/examples/ \
            README.md=/usr/share/doc/wardex/README.md \
            LICENSE=/usr/share/doc/wardex/LICENSE

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: wardex-deb
          path: "*.deb"
          if-no-files-found: error

      - name: Upload rpm package
        uses: actions/upload-artifact@v4
        with:
          name: wardex-rpm
          path: "*.rpm"
          if-no-files-found: error

  # ── Container image vulnerability scan ───────────────────────────────
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        run: docker build -t wardex:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: wardex:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Push & sign container image ───────────────────────────────────
  container-push:
    name: Push & Sign Container Image
    needs: [container-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
          cosign sign --yes \
            ghcr.io/${{ github.repository }}:latest

  release:
    name: Publish GitHub Release
    needs: [build, sbom, helm-lint, linux-packages, container-scan, container-push]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      # Extract the first ## section from CHANGELOG.md as the release body
      - name: Extract release notes
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md \
            | tail -n +2 > release_notes.md
          echo "=== Release notes ==="
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wardex ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release-assets/*
