name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl binary — runs on any distro) ─────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            archive: wardex-linux-x86_64.tar.gz
            extra_packages: musl-tools

          # ── macOS Apple Silicon (macos-latest = arm64) ──────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            archive: wardex-macos-aarch64.tar.gz

          # ── macOS Intel ───────────────────────────────────────────────────
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x86_64
            archive: wardex-macos-x86_64.tar.gz

          # ── Windows ─────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive: wardex-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Install admin console dependencies
        run: npm ci --prefix admin-console

      - name: Install extra packages (Linux)
        if: matrix.extra_packages != ''
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Linux / macOS) ──────────────────────────────────────────
      - name: Create package (Unix)
        if: runner.os != 'Windows'
        run: |
          PKG="wardex-${{ matrix.platform }}"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/wardex" "$PKG/wardex"
          chmod +x "$PKG/wardex"
          cp -r site "$PKG/site"
          cp -r examples "$PKG/examples"
          cp README.md LICENSE "$PKG/"
          tar -czf "${{ matrix.archive }}" "$PKG"
          echo "Package contents:"
          tar -tzf "${{ matrix.archive }}"

      # ── Package (Windows) ────────────────────────────────────────────────
      - name: Create package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "wardex-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\wardex.exe" "$pkg\wardex.exe"
          Copy-Item -Recurse site "$pkg\site"
          Copy-Item -Recurse examples "$pkg\examples"
          Copy-Item README.md, LICENSE "$pkg\"
          Compress-Archive -Path "$pkg\*" -DestinationPath "${{ matrix.archive }}"
          Write-Host "Package contents:"
          (Get-ChildItem -Recurse $pkg).FullName

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

      # ── SLSA v1.0 provenance attestation ────────────────────────────────
      # Binds each release archive to the workflow run that produced it so
      # downstream consumers can verify provenance with:
      #   gh attestation verify <archive> --repo pinkysworld/Wardex
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.archive }}

  # ── Generate CycloneDX SBOM ──────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --override-filename wardex-sbom.cdx

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wardex-sbom.cdx.json
          path: wardex-sbom.cdx.json

  # ── Lint Helm chart ──────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint deploy/helm/wardex/

  # ── Build deb & rpm packages ─────────────────────────────────────
  linux-packages:
    name: Build Linux Packages (deb/rpm)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wardex-linux-x86_64.tar.gz
          path: .

      - name: Extract binary
        run: |
          tar -xzf wardex-linux-x86_64.tar.gz
          chmod +x wardex-linux-x86_64/wardex

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install fpm -N

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build deb package
        run: |
          fpm -s dir -t deb \
            --name wardex \
            --version "${{ steps.version.outputs.tag }}" \
            --architecture amd64 \
            --description "Wardex XDR platform" \
            --url "https://github.com/${{ github.repository }}" \
            --license "BSL-1.1" \
            --maintainer "${{ github.repository_owner }}" \
            --after-install deploy/scripts/postinstall-linux-package.sh \
            --deb-systemd deploy/wardex.service \
            wardex-linux-x86_64/wardex=/usr/bin/wardex \
            examples/=/usr/share/wardex/examples/ \
            site/=/usr/share/wardex/site/ \
            README.md=/usr/share/doc/wardex/README.md \
            LICENSE=/usr/share/doc/wardex/LICENSE

      - name: Build rpm package
        run: |
          fpm -s dir -t rpm \
            --name wardex \
            --version "${{ steps.version.outputs.tag }}" \
            --architecture x86_64 \
            --description "Wardex XDR platform" \
            --url "https://github.com/${{ github.repository }}" \
            --license "BSL-1.1" \
            --maintainer "${{ github.repository_owner }}" \
            wardex-linux-x86_64/wardex=/usr/bin/wardex \
            examples/=/usr/share/wardex/examples/ \
            site/=/usr/share/wardex/site/ \
            README.md=/usr/share/doc/wardex/README.md \
            LICENSE=/usr/share/doc/wardex/LICENSE

      - name: Upload deb package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wardex-deb
          path: "*.deb"
          if-no-files-found: error

      - name: Upload rpm package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wardex-rpm
          path: "*.rpm"
          if-no-files-found: error

  # ── Container image vulnerability scan ───────────────────────────────
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image for scanning
        run: docker build -t wardex:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: latest
          image-ref: wardex:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Push & sign container image ───────────────────────────────────
  container-push:
    name: Push & Sign Container Image
    needs: [container-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve container image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
          cosign sign --yes \
            ${{ steps.image.outputs.name }}:latest

      # ── SLSA v1.0 container provenance ──────────────────────────────────
      - name: Generate container provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  release:
    name: Publish GitHub Release
    needs: [build, sbom, helm-lint, linux-packages]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets
          pattern: wardex*
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      # Extract the first ## section from CHANGELOG.md as the release body
      - name: Extract release notes
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md \
            | tail -n +2 > release_notes.md
          echo "=== Release notes ==="
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "Wardex ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release-assets/*

  sync-release-distribution:
    name: Sync Distribution Channels
    needs: [release]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Validate workflow dispatch token
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          if [[ -z "$RELEASE_WORKFLOW_TOKEN" ]]; then
            echo "RELEASE_WORKFLOW_TOKEN secret is required to dispatch follow-up workflows from the release pipeline." >&2
            exit 1
          fi

      - name: Dispatch Pages publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          gh workflow run pages.yml \
            -R "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="${GITHUB_REF_NAME}"

      - name: Dispatch Homebrew tap sync
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          gh workflow run sync-homebrew-tap.yml \
            -R "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="${GITHUB_REF_NAME}"
