name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build & Package — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl binary — runs on any distro) ─────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            archive: wardex-linux-x86_64.tar.gz
            extra_packages: musl-tools

          # ── macOS Intel ─────────────────────────────────────────────────
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos-x86_64
            archive: wardex-macos-x86_64.tar.gz

          # ── macOS Apple Silicon ──────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            archive: wardex-macos-aarch64.tar.gz

          # ── Windows ─────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive: wardex-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install extra packages (Linux)
        if: matrix.extra_packages != ''
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Linux / macOS) ──────────────────────────────────────────
      - name: Create package (Unix)
        if: runner.os != 'Windows'
        run: |
          PKG="wardex-${{ matrix.platform }}"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/wardex" "$PKG/wardex"
          chmod +x "$PKG/wardex"
          cp -r site "$PKG/site"
          cp -r examples "$PKG/examples"
          cp README.md LICENSE "$PKG/"
          tar -czf "${{ matrix.archive }}" "$PKG"
          echo "Package contents:"
          tar -tzf "${{ matrix.archive }}"

      # ── Package (Windows) ────────────────────────────────────────────────
      - name: Create package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "wardex-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\wardex.exe" "$pkg\wardex.exe"
          Copy-Item -Recurse site "$pkg\site"
          Copy-Item -Recurse examples "$pkg\examples"
          Copy-Item README.md, LICENSE "$pkg\"
          Compress-Archive -Path "$pkg\*" -DestinationPath "${{ matrix.archive }}"
          Write-Host "Package contents:"
          (Get-ChildItem -Recurse $pkg).FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      # Extract the first ## section from CHANGELOG.md as the release body
      - name: Extract release notes
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md \
            | tail -n +2 > release_notes.md
          echo "=== Release notes ==="
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wardex ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: release-assets/*
