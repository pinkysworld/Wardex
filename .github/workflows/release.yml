name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl binary — runs on any distro) ─────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: wardex-linux-x86_64
            extra_packages: musl-tools

          # ── macOS Intel ─────────────────────────────────────────────────
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: wardex-macos-x86_64

          # ── macOS Apple Silicon ──────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wardex-macos-aarch64

          # ── Windows ─────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wardex-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install extra packages (Linux)
        if: matrix.extra_packages != ''
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Copy + rename (Unix)
      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/wardex" "${{ matrix.artifact }}"

      # Copy + rename (Windows — shell uses backslash)
      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\wardex.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      # Extract the first ## section from CHANGELOG.md as the release body
      - name: Extract release notes
        id: notes
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md \
            | tail -n +2 > release_notes.md
          echo "Release notes extracted:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wardex ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: release-assets/*
