name: Sync Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, e.g. v0.52.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync-homebrew-tap:
    name: Sync Homebrew Tap
    runs-on: ubuntu-latest
    env:
      TAP_REPOSITORY: pinkysworld/homebrew-wardex
    steps:
      - name: Validate tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret is required to push formula updates to ${TAP_REPOSITORY}." >&2
            exit 1
          fi

      - name: Checkout default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve release version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          tag="$RELEASE_TAG"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          fi
          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Download source archive
        env:
          SOURCE_ARCHIVE_URL: https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz
        run: |
          curl --fail --location --retry 5 --retry-delay 5 --output wardex-source.tar.gz "$SOURCE_ARCHIVE_URL"

      - name: Compute source archive checksum
        id: checksums
        run: |
          echo "source=$(sha256sum wardex-source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPOSITORY}.git" tap-repo

      - name: Render tap formula
        run: |
          bash deploy/homebrew/render_formula.sh \
            "${{ steps.release.outputs.version }}" \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz" \
            "${{ steps.checksums.outputs.source }}" \
            tap-repo/Formula/wardex.rb

      - name: Validate formula syntax
        run: ruby -c tap-repo/Formula/wardex.rb

      - name: Commit and push tap update
        working-directory: tap-repo
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git diff --quiet -- Formula/wardex.rb; then
            echo "No tap changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wardex.rb
          git commit -m "chore: update wardex formula to ${VERSION}"
          git push origin HEAD:main