name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 4 * * 1'   # Nightly Monday 04:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy rustfmt
          rustup default stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Security audit
        run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses, advisories, and bans
        run: cargo deny check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage
        run: cargo tarpaulin --out xml --skip-clean --fail-under 70
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: cobertura.xml

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install MSRV toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Check MSRV compiles
        run: cargo check --all-targets

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install SDK dependencies
        run: |
          cd sdk/python
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest
      - name: Run Python SDK tests
        run: |
          cd sdk/python
          python -m pytest tests/ -v
      - name: Lint SDK
        run: |
          pip install ruff
          ruff check sdk/python/

  semver-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Check semver compatibility
        run: cargo semver-checks check-release || echo "semver baseline not yet published — skipping"

  fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore fuzz corpus cache
        uses: actions/cache@v5
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: fuzz-corpus-
      - name: Fuzz CSV parser (60s)
        run: cd fuzz && cargo +nightly fuzz run csv_parse -- -max_total_time=60
      - name: Fuzz JSONL parser (60s)
        run: cd fuzz && cargo +nightly fuzz run jsonl_parse -- -max_total_time=60
      - name: Fuzz YARA loader (60s)
        run: cd fuzz && cargo +nightly fuzz run yara_load -- -max_total_time=60
      - name: Fuzz Sigma import (60s)
        run: cd fuzz && cargo +nightly fuzz run sigma_import -- -max_total_time=60
      - name: Fuzz search query (60s)
        run: cd fuzz && cargo +nightly fuzz run search_query -- -max_total_time=60
      - name: Fuzz secrets expand (60s)
        run: cd fuzz && cargo +nightly fuzz run secrets_expand -- -max_total_time=60

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build SDK
        run: npm run build
      - name: Run tests
        run: npm test -- --run

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-console
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-console/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npm test -- --run
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E tests
        run: npx playwright test --project=chromium

  feature-flags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check with no default features
        run: cargo check --no-default-features || echo "Feature-gated modules have cross-deps — tracked for future cleanup"
      - name: Check with all features
        run: cargo check --all-features

  binary-attestation:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Build release binary
        run: cargo build --release
      - name: Generate SHA-256 manifest
        run: |
          cd target/release
          sha256sum wardex > wardex.sha256
          echo "Binary attestation manifest:"
          cat wardex.sha256
      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-cdx
      - name: Upload attestation
        uses: actions/upload-artifact@v7
        with:
          name: binary-attestation
          path: |
            target/release/wardex.sha256
            wardex_bom.cdx.json

  sdk-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install SDK generation tooling
        run: |
          cd sdk/typescript
          npm ci
          npm install -g @openapitools/openapi-generator-cli
      - name: Regenerate SDKs
        run: bash sdk/generate.sh
      - name: Verify generated SDKs are committed
        run: git diff --exit-code -- sdk/python sdk/typescript

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        run: docker build -t wardex:ci-scan .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          cache: 'false'
          image-ref: wardex:ci-scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
