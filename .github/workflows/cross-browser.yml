name: Cross-Browser Smoke

# Nightly cross-browser Playwright smoke run against the admin console.
#
# The default `frontend` job in ci.yml only runs the chromium project so PR
# turnaround stays fast. This workflow runs the same Playwright suite against
# firefox and webkit on a schedule (and on demand via workflow_dispatch) so
# CSS / keyboard / web-platform regressions are caught before release.
#
# Failures here are surfaced as workflow alerts; they do not block PR merges.

on:
  schedule:
    # Run every night at 02:30 UTC.
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  cross-browser:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [firefox, webkit]
    defaults:
      run:
        working-directory: admin-console
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-console/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser (${{ matrix.project }})
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: Playwright E2E (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cross-browser-playwright-${{ matrix.project }}
          path: |
            admin-console/test-results/
            admin-console/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
